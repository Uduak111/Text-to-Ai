<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pop AI - Free Text to Video Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header {
      padding: 20px;
      background: #111;
      font-size: 32px;
      font-weight: bold;
    }

    .container {
      width: 90%;
      max-width: 600px;
      margin: auto;
      padding-top: 40px;
    }

    textarea {
      width: 100%;
      height: 140px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    select, button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #ff0066;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #ff3380;
    }

    .note {
      margin-top: 20px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <header>POP AI — Free Text to Video</header>

  <div class="container">
    <textarea id="promptInput" placeholder="Describe your video..."></textarea>

    <select id="styleSelect">
      <option value="realistic">Realistic</option>
      <option value="anime">Anime</option>
      <option value="cartoon">Cartoon / 3D</option>
      <option value="story">Story Style (TikTok/YouTube Shorts)</option>
    </select>

    <button onclick="generateVideo()">Generate Video</button>

    <div class="note">
      Videos will open in a new tab using a free AI video generator.
    </div>
  </div>

  <script>
    function generateVideo() {
      const prompt = document.getElementById("promptInput").value;
      const style = document.getElementById("styleSelect").value;

      if (!prompt) {
        alert("Please enter a prompt.");
        return;
      }

      // Base free AI video generator URL
      let url = "https://arting.ai/text-to-video?prompt=" + encodeURIComponent(prompt);

      // Add style parameter (if supported by the free site)
      if (style === "anime") url += "&style=anime";
      if (style === "cartoon") url += "&style=cartoon";
      if (style === "story") url += "&style=story";
      // Realistic style will use default

      // Open the AI generator in a new tab
      window.open(url, "_blank");
    }
  </script>
</body>
</html>
