<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pop AI - Free Text to Video Generator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      padding: 20px;
      background: #111;
      font-size: 32px;
      font-weight: bold;
    }
    .container {
      width: 90%;
      max-width: 600px;
      margin: auto;
      padding-top: 40px;
    }
    textarea {
      width: 100%;
      height: 140px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      outline: none;
    }
    select, button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }
    button {
      background: #ff0066;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #ff3380;
    }
    video {
      width: 100%;
      margin-top: 25px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <header>POP AI — Free Text to Video</header>

  <div class="container">
    <textarea id="promptInput" placeholder="Describe your video..."></textarea>

    <select id="styleSelect">
      <option value="realistic">Realistic</option>
      <option value="anime">Anime</option>
      <option value="cartoon">Cartoon / 3D</option>
      <option value="story">Story Style (TikTok/YouTube Shorts)</option>
    </select>

    <button onclick="generateVideo()">Generate Video</button>

    <div id="status"></div>
    <video id="resultVideo" controls style="display:none;"></video>
  </div>

  <script>
    function generateVideo() {
      const prompt = document.getElementById("promptInput").value;
      const style = document.getElementById("styleSelect").value;
      const status = document.getElementById("status");
      const video = document.getElementById("resultVideo");

      if (!prompt) {
        alert("Please enter a prompt.");
        return;
      }

      status.innerHTML = "🎥 Generating video, please wait 10–20 seconds...";
      video.style.display = "none";

      // FREE BACKEND — No API key needed
      fetch("https://api-free-text-video.onrender.com/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt, style })
      })
      .then(res => res.json())
      .then(data => {
        if (data.video_url) {
          status.innerHTML = "✅ Video generated!";
          video.src = data.video_url;
          video.style.display = "block";
        } else {
          status.innerHTML = "❌ Error generating video.";
        }
      })
      .catch(() => {
        status.innerHTML = "❌ Server busy. Try again.";
      });
    }
  </script>

</body>
  </html>
